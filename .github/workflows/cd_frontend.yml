name: Deploy frontend

on:
  push:
    branches:
        - main
    paths:
        - 'app/web/**'
        - 'packages/**'
        - 'docker/frontend.DockerFile'

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2

            - name: Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v4
              with:
                context: .
                file: ./docker/frontend.DockerFile
                build-args: |
                    DATABASE_URL=${{ secrets.DATABASE_URL }}
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:${{ github.sha }}
                    ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest

            - name: SSH into VM and deploy
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                    sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest
                    sudo docker stop frontend || true
                    sudo docker rm frontend || true
                    sudo docker run -d --name frontend -p 3000:3000 --restart always -e DATABASE_URL=${{ secrets.DATABASE_URL }} ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest
                    sudo docker system prune -f